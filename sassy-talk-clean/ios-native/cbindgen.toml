# cbindgen configuration for iOS bindings

language = "C"
include_guard = "SASSYTALKIE_IOS_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
namespace = "sassytalkie"
cpp_compat = true
style = "both"

[export]
include = ["sassytalkie_init", "sassytalkie_shutdown"]

[export.rename]
"sassytalkie_ios" = "sassytalkie"
